<div class="fab" aria-label="Contacto rápido">
  {% if site.contact.whatsapp %}
  <a class="fab__btn fab__btn--wa" href="https://wa.me/{{ site.contact.whatsapp }}" target="_blank" rel="noopener" aria-label="Escríbanos por WhatsApp" title="WhatsApp">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 11.5a7.5 7.5 0 1 1 3.2 6.15L4 18.5l.9-3.1A7.4 7.4 0 0 1 4 11.5Z"/><path d="M9 9.2c.2-.5.4-.5.7-.5h.5c.2 0 .4 0 .6.5l.5 1.2c.1.2 0 .4-.1.5l-.4.4c-.1.1-.2.3-.1.5.3.6 1 1.4 1.8 1.8.2.1.4 0 .5-.1l.4-.5c.1-.2.3-.2.5-.1l1.2.6c.2.1.3.3.3.5 0 .6-.4 1.1-.9 1.3-.5.2-1.1.2-2.6-.5a7 7 0 0 1-3.3-3.4c-.6-1.3-.4-2 0-2.4Z"/></svg>
  </a>
  {% endif %}
  <a class="fab__btn fab__btn--tel" href="tel:{{ site.contact.phone_href }}" aria-label="Llamar por teléfono" title="Llamar">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h3l2 5-2.2 1.1a11 11 0 0 0 5.1 5.1L15 12l5 2v3a2 2 0 0 1-2 2A16 16 0 0 1 4 5a2 2 0 0 1 2-2Z"/></svg>
  </a>
  <a class="fab__btn fab__btn--cta" href="index.html#contacto" aria-label="Solicitar asesoría" title="Solicitar asesoría">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18v12H3z"/><path d="m3 7 9 6 9-6"/></svg>
  </a>
</div>
